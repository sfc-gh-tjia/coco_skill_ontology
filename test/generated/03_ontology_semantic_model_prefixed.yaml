verified_queries:
- name: list_cell_types
  question: What types of cell type exist in the ontology?
  sql: >
    SELECT ID, LABEL, DESCRIPTION
    FROM TEMP.ONTOLOGY_POC.TEST_COCO_SKILL_VW_ONT_CELLTYPE
    ORDER BY LABEL LIMIT 50
  verified_at: 1771906762
  verified_by: Ontology Semantic Modeler
- name: direct_children
  question: What are the direct children of epithelial cell?
  sql: >
    SELECT CHILD_ID, CHILD_NAME
    FROM TEMP.ONTOLOGY_POC.TEST_COCO_SKILL_VW_ONT_SUBCLASS_OF
    WHERE PARENT_NAME = 'epithelial cell'
    ORDER BY CHILD_NAME
  verified_at: 1771906762
  verified_by: Ontology Semantic Modeler
- name: direct_parents
  question: What are the parents of hepatocyte?
  sql: >
    SELECT PARENT_ID, PARENT_NAME
    FROM TEMP.ONTOLOGY_POC.TEST_COCO_SKILL_VW_ONT_SUBCLASS_OF
    WHERE CHILD_NAME = 'hepatocyte'
    ORDER BY PARENT_NAME
  verified_at: 1771906762
  verified_by: Ontology Semantic Modeler
- name: descendants_recursive
  question: What are all descendants of epithelial cell?
  sql: >
    WITH RECURSIVE descendants AS (
      SELECT ID AS NODE_ID, LABEL AS NODE_NAME, 0 AS depth
      FROM TEMP.ONTOLOGY_POC.TEST_COCO_SKILL_VW_ONT_CELLTYPE
      WHERE LABEL = 'epithelial cell'
      UNION ALL
      SELECT c.CHILD_ID, c.CHILD_NAME, d.depth + 1
      FROM TEMP.ONTOLOGY_POC.TEST_COCO_SKILL_VW_ONT_SUBCLASS_OF c
      JOIN descendants d ON c.PARENT_ID = d.NODE_ID
      WHERE d.depth < 10
    )
    SELECT NODE_ID, NODE_NAME, depth FROM descendants ORDER BY depth, NODE_NAME
  verified_at: 1771906762
  verified_by: Ontology Semantic Modeler
- name: most_children
  question: Which entities have the most direct children?
  sql: >
    SELECT PARENT_NAME, COUNT(DISTINCT CHILD_ID) AS child_count
    FROM TEMP.ONTOLOGY_POC.TEST_COCO_SKILL_VW_ONT_SUBCLASS_OF
    GROUP BY PARENT_NAME
    ORDER BY child_count DESC
    LIMIT 20
  verified_at: 1771906762
  verified_by: Ontology Semantic Modeler
