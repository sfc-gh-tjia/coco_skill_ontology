  CL_PRISM ontology hierarchy for dynamic traversal. Contains cell type entities
  and their subClassOf relationships from the Cell Ontology.
  Use for finding descendants, hierarchy paths, and entity lookups.
  For cohort expansion queries, use recursive CTEs on the SUBCLASS_RELATIONS table.
  Generated by ontology-semantic-modeler skill.
