verified_queries:
- name: list_entity_types
  question: What types of celltype exist in the ontology?
  sql: SELECT ID, LABEL, DESCRIPTION FROM VW_ONT_CELLTYPE ORDER BY LABEL LIMIT 50
  verified_at: 1771906762
  verified_by: Ontology Semantic Modeler
- name: direct_children
  question: What are the direct children of a given entity?
  sql: SELECT CHILD_ID, CHILD_NAME FROM VW_ONT_SUBCLASS_OF WHERE PARENT_NAME = '{entity_name}' ORDER BY CHILD_NAME
  verified_at: 1771906762
  verified_by: Ontology Semantic Modeler
- name: direct_parents
  question: What are the parents of a given entity?
  sql: SELECT PARENT_ID, PARENT_NAME FROM VW_ONT_SUBCLASS_OF WHERE CHILD_NAME = '{entity_name}' ORDER BY PARENT_NAME
  verified_at: 1771906762
  verified_by: Ontology Semantic Modeler
- name: descendants_recursive
  question: What are all descendants of a given entity?
  sql: "WITH RECURSIVE descendants AS (\n  SELECT ID AS NODE_ID, LABEL AS NODE_NAME, 0 AS depth\n  FROM VW_ONT_CELLTYPE WHERE\
    \ LABEL = '{entity_name}'\n  UNION ALL\n  SELECT c.CHILD_ID, c.CHILD_NAME, d.depth + 1\n  FROM VW_ONT_SUBCLASS_OF c\n\
    \  JOIN descendants d ON c.PARENT_ID = d.NODE_ID\n  WHERE d.depth < 10\n)\nSELECT NODE_ID, NODE_NAME, depth FROM descendants\
    \ ORDER BY depth, NODE_NAME"
  verified_at: 1771906762
  verified_by: Ontology Semantic Modeler
- name: most_children
  question: Which entities have the most direct children?
  sql: SELECT PARENT_NAME, COUNT(DISTINCT CHILD_ID) AS child_count FROM VW_ONT_SUBCLASS_OF GROUP BY PARENT_NAME ORDER BY child_count
    DESC LIMIT 20
  verified_at: 1771906762
  verified_by: Ontology Semantic Modeler
